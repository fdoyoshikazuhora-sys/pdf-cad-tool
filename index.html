<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF to CAD Tool</title>
    <style>
      html, body { width: 100%; height: 100%; margin: 0; background: #101316; }
      iframe { display: block; width: 100%; height: 100%; border: 0; background: #101316; }
      noscript { color: #fff; font: 16px system-ui, sans-serif; padding: 24px; display: block; }
    </style>
  </head>
  <body>
    <noscript>JavaScript is required to run the PDF to CAD Tool.</noscript>
    <iframe id="pdfCadFrame" title="PDF to CAD Tool"></iframe>
    <script>
      const frame = document.querySelector("#pdfCadFrame");
      const childUrl = new URL("./pdf-cad/pdf-cad.html", window.location.href);
      for (const [key, value] of new URLSearchParams(window.location.search)) {
        childUrl.searchParams.set(key, value);
      }
      frame.src = childUrl.toString();
    </script>
  </body>
</html>
